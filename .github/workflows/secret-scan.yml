name: Secret Scan

on:
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]

concurrency:
  group: secret-scan-${{ github.ref }}
  cancel-in-progress: true

jobs:
  secret-scan:
    if: github.event.pull_request.draft == false
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: read
    env:
      GITLEAKS_VERSION: "8.24.2"
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install gitleaks
        run: |
          set -euo pipefail
          curl -sSL "https://github.com/gitleaks/gitleaks/releases/download/v${GITLEAKS_VERSION}/gitleaks_${GITLEAKS_VERSION}_linux_x64.tar.gz" -o gitleaks.tar.gz
          tar -xzf gitleaks.tar.gz gitleaks
          mkdir -p "$HOME/.local/bin"
          install -m 0755 gitleaks "$HOME/.local/bin/gitleaks"
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"
          "$HOME/.local/bin/gitleaks" version

      - name: Scan tracked files
        id: scan_repo
        continue-on-error: true
        run: |
          gitleaks dir --source . --redact --report-format sarif --report-path gitleaks-tracked.sarif

      - name: Scan pull request diff
        id: scan_diff
        continue-on-error: true
        run: |
          gitleaks git --redact --log-opts="${{ github.event.pull_request.base.sha }}..${{ github.sha }}" --report-format sarif --report-path gitleaks-diff.sarif

      - name: Upload gitleaks reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: gitleaks-reports
          path: |
            gitleaks-tracked.sarif
            gitleaks-diff.sarif
          if-no-files-found: ignore

      - name: Emit advisory summary
        if: always()
        run: |
          if [[ "${{ steps.scan_repo.outcome }}" != "success" || "${{ steps.scan_diff.outcome }}" != "success" ]]; then
            echo "::warning::Potential secrets detected. Review the gitleaks reports artifact."
          else
            echo "No secrets detected in tracked files or PR diff."
          fi
