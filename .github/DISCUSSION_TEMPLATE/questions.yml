labels: [question]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for your interest in SceneDream.

        Please include enough detail for others to reproduce your setup and help quickly.
  - type: checkboxes
    id: checks
    attributes:
      label: First Check
      options:
        - label: I searched existing issues and discussions.
          required: true
        - label: I checked README/development docs for this workflow.
          required: true
        - label: I included the key commands and logs needed to debug this.
          required: true
  - type: textarea
    id: command
    attributes:
      label: Command / action
      description: |
        What did you run or try?
      placeholder: "`cd backend && uv run ...`"
    validations:
      required: true
  - type: textarea
    id: description
    attributes:
      label: Description
      description: |
        What happened? Include expected behavior vs. actual behavior.
      placeholder: |
        I expected ..., but got ...
    validations:
      required: true
  - type: textarea
    id: environment
    attributes:
      label: Environment details
      description: OS, Python version, provider setup, and any other relevant context.
    validations:
      required: true
  - type: textarea
    id: logs
    attributes:
      label: Logs or screenshots
      description: Paste any relevant logs, tracebacks, or screenshots.
