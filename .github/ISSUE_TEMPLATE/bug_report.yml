name: Bug report
description: Report a reproducible problem in SceneDream.
title: "[Bug]: "
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for reporting this. Please provide enough detail to reproduce the issue.
  - type: checkboxes
    id: preflight
    attributes:
      label: Preflight
      options:
        - label: I searched existing issues and discussions before opening this report.
          required: true
        - label: I can reproduce this issue on the latest code in this repository.
          required: true
  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: What happened?
      placeholder: A short description of the bug.
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      description: Include exact commands, inputs, and file paths if relevant.
      placeholder: |
        1. Run `...`
        2. Open `...`
        3. Observe `...`
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
      placeholder: What should have happened instead?
    validations:
      required: true
  - type: textarea
    id: logs
    attributes:
      label: Logs and screenshots
      description: Paste relevant stack traces or screenshots.
      render: shell
  - type: input
    id: version
    attributes:
      label: Commit / version
      description: Commit SHA, tag, or branch tested.
      placeholder: main @ abc1234
  - type: dropdown
    id: area
    attributes:
      label: Affected area
      options:
        - Backend
        - Frontend
        - Pipeline Orchestration
        - Ingestion
        - Scene Extraction / Ranking
        - Prompt / Image Generation
        - Docs / Tooling
        - Other
